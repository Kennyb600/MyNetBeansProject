spring.application.name=wms-backend
# ----------------------------------------
# Application Server Settings
# ----------------------------------------
# This changes the port your Java application (embedded Tomcat) listens on
server.port=9090

# ----------------------------------------
# Database Connection Settings
# ----------------------------------------
# This tells your application to reach out and connect to MySQL on port 3306
spring.datasource.url=jdbc:mysql://localhost:3306/wms_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=P@ssword123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------
# Hibernate / JPA Settings
# ----------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true